name: 同步飞书数据

on:
  schedule:
    # 每天早上8点自动同步（北京时间）
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 也支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 从飞书拉取数据并地理编码
        env:
          FEISHU_BASE_TOKEN: DlYLbP9eBaNKvBsyy8HcFncynYc
          FEISHU_TABLE_ID: tbl4A1MiA4uzpQ1q
          GAODE_KEY: ${{ secrets.GAODE_KEY }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        run: |
          python -c "
          import json, urllib.request, urllib.parse, os, time

          # Get Feishu tenant access token
          app_id = os.environ['FEISHU_APP_ID']
          app_secret = os.environ['FEISHU_APP_SECRET']
          token_url = 'https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal'
          req = urllib.request.Request(token_url, method='POST',
              data=json.dumps({'app_id': app_id, 'app_secret': app_secret}).encode(),
              headers={'Content-Type': 'application/json'})
          resp = json.loads(urllib.request.urlopen(req).read())
          token = resp['tenant_access_token']

          # Fetch records from Feishu Base
          base_token = os.environ['FEISHU_BASE_TOKEN']
          table_id = os.environ['FEISHU_TABLE_ID']
          list_url = f'https://open.feishu.cn/open-apis/bitable/v1/apps/{base_token}/tables/{table_id}/records?page_size=500'
          req = urllib.request.Request(list_url, headers={'Authorization': f'Bearer {token}'})
          resp = json.loads(urllib.request.urlopen(req).read())
          records = resp.get('data', {}).get('items', [])

          print(f'Fetched {len(records)} records from Feishu')

          # Map fields to restaurant format
          restaurants = []
          for rec in records:
              f = rec.get('fields', {})
              # Handle select fields (stored as string or list)
              scene = f.get('场景标签', '')
              if isinstance(scene, list): scene = scene[0] if scene else ''
              cuisine = f.get('菜系', '')
              if isinstance(cuisine, list): cuisine = cuisine[0] if cuisine else ''

              r = {
                  'name': f.get('餐厅名称', ''),
                  'address': f.get('地址', ''),
                  'scene': scene,
                  'cuisine': cuisine,
                  'avgPrice': int(f.get('人均', 0) or 0),
                  'rating': f.get('大众评分') or None,
                  'dishes': f.get('推荐菜', ''),
                  'phone': f.get('电话', ''),
                  'recommender': f.get('推荐人', ''),
                  'comment': f.get('推荐语', ''),
                  'minefield': bool(f.get('排雷')),
                  'minefieldNote': f.get('排雷说明', ''),
                  'lat': None,
                  'lng': None,
              }
              # Parse coordinates if stored
              coord = f.get('经纬度', '')
              if coord and ',' in str(coord):
                  parts = str(coord).split(',')
                  try:
                      r['lat'] = float(parts[0].strip())
                      r['lng'] = float(parts[1].strip())
                  except: pass

              if r['name']:
                  restaurants.append(r)

          # Geocode addresses without coordinates
          gaode_key = os.environ.get('GAODE_KEY', '')
          for r in restaurants:
              if r['lat'] and r['lng']:
                  continue
              if not r['address'] or not gaode_key:
                  continue
              params = urllib.parse.urlencode({
                  'key': gaode_key, 'address': r['address'],
                  'city': '广州', 'output': 'JSON'
              })
              try:
                  req = urllib.request.urlopen(f'https://restapi.amap.com/v3/geocode/geo?{params}', timeout=10)
                  data = json.loads(req.read().decode())
                  if data['status'] == '1' and data['geocodes']:
                      loc = data['geocodes'][0]['location']
                      lng, lat = loc.split(',')
                      r['lat'] = float(lat)
                      r['lng'] = float(lng)
                      print(f'Geocoded: {r[\"name\"][:30]} -> ({lat}, {lng})')
              except Exception as e:
                  print(f'Geocode failed: {r[\"name\"][:30]}: {e}')
              time.sleep(0.15)

          # Write restaurants.js
          today = __import__('datetime').date.today().strftime('%Y-%m-%d')
          js = f'// 千篇万律·美食推荐（广州站）\n// 数据由群友推荐 + 管理员维护\n// 最后更新: {today}\n\nvar RESTAURANTS = {json.dumps(restaurants, ensure_ascii=False, indent=2)};\n'
          with open('restaurants.js', 'w', encoding='utf-8') as f:
              f.write(js)

          print(f'Synced {len(restaurants)} restaurants to restaurants.js')
          "

      - name: 提交并推送变更
        run: |
          git config user.name "food-map-bot"
          git config user.email "bot@qianpianwanlv.github.io"
          git add restaurants.js
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto sync: 飞书数据同步 + 坐标校准"
            git push
          fi
